<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Bill Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="hero">
        <div>
            <p class="eyebrow">Quick order summary</p>
            <h1><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 2C5.44772 2 5 2.44772 5 3V11C5 11.5523 5.44772 12 6 12H8C8.55228 12 9 11.5523 9 11V3C9 2.44772 8.55228 2 8 2H6Z" fill="#2B6CB0"/><path d="M14 2C13.4477 2 13 2.44772 13 3V11C13 11.5523 13.4477 12 14 12H16C16.5523 12 17 11.5523 17 11V3C17 2.44772 16.5523 2 16 2H14Z" fill="#2B6CB0"/><path d="M4 14C4 13.4477 4.44772 13 5 13H7C7.55228 13 8 13.4477 8 14V22H5C4.44772 22 4 21.5523 4 21V14Z" fill="#2B6CB0"/><path d="M12 14C12 13.4477 12.4477 13 13 13H15C15.5523 13 16 13.4477 16 14V22H13C12.4477 22 12 21.5523 12 21V14Z" fill="#2B6CB0"/><path d="M20 14C20 13.4477 20.4477 13 21 13H23C23.5523 13 24 13.4477 24 14V22H21C20.4477 22 20 21.5523 20 21V14Z" fill="#2B6CB0"/></svg></span> Restaurant Bill Generator</h1>
            <p class="subtitle">Choose quantities and generate your bill instantly with GST included.</p>
        </div>
    </header>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price (₹)</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody id="menuBody"></tbody>
        </table>
    </div>

    <button onclick="generateBill()">Generate Bill</button>

    <section id="bill" class="bill-card">
        <div class="empty-state">
            <h2>Bill Summary</h2>
            <p>Select your items above and click the button to view the total.</p>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
